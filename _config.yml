about_profile_image: images/ktj.jpeg
about_content: |
  Java/Spring을 중심으로 백엔드 개발 경험을 쌓아오고 있습니다. 하나의 기술에 안주하지 않고 새로운 것을 꾸준히 익히며, 배운 것을 실제 서비스에 적용해보는 과정에서 가장 큰 보람을 느낍니다. 
  기술은 결국 문제를 해결하기 위한 도구라는 생각으로, 상황에 맞는 기술을 선택하고 적용하는 능력을 키워가고 있습니다.

  현재는 성능과 안정성에 관심이 많아, 더 빠르고 효율적인 시스템을 만들기 위한 방법들을 탐구하고 있습니다. 
  단순히 돌아가는 코드보다 더 나은 구조를 고민하고, 실제로 체감할 수 있는 개선을 만들어내는 개발자가 되고 싶습니다.

  문서화의 힘을 믿고, 팀원 누구나 맥락을 공유할 수 있도록 기록을 남기는 것을 습관으로 삼고 있습니다. 
  사람들과 잘 어우러지며 협업하는 것을 즐기고, 좋은 팀 안에서 함께 성장하는 개발 문화를 만들어가고 싶습니다.

content:
  - title: 경력
    layout: list
    content:
      - layout: left
        title: IoT 스타트업
        sub_title: Backend Engineer
        caption: 2023. 06 ~ 2024. 08
        quote: >
          IoT 기반 서비스 백엔드 개발 및 농업·환경 도메인 R&D 과제 참여
        description: |
          - MQTT 통신을 활용한 IoT 디바이스 실시간 데이터 수집 및 시각화 개발
          - 회사 웹사이트 제작 및 유지보수
          - 농업·환경 도메인 R&D 사업 웹 시스템 설계 및 개발 참여
          
      - layout: left
        title: 웹 에이전시
        sub_title: Engineer Intern
        caption: 2023. 03 ~ 2023. 05
        quote: >
          React 기반 웹 서비스 개발팀 인턴으로 협업 문화 경험
        description: |
          - 코드 리뷰 참여를 통한 실무 코드 품질 기준 및 협업 방식 습득
          - Git/GitHub 기반 협업 워크플로우 실무 적용
      

  - title: 프로젝트
    layout: list
    content:
      - layout: top-left
        title: 우주 쓰레기 실시간 관제 시스템
        sub_title: 개인 프로젝트 (진행 예정)
        caption: Spring Boot · React · Redis · Spring Batch · Docker · GitHub Actions
        quote: >
          우주 물체의 실시간 궤도 데이터를 수집·처리·시각화하는 관제 시스템
        description: |
          - 실시간 우주 물체 궤도 데이터 수집 및 처리 파이프라인 설계
          - Redis를 활용한 데이터 캐싱 및 조회 성능 최적화
          - Spring Batch 기반 대용량 데이터 배치 처리
          - Docker 컨테이너화 및 CI/CD 자동화, 서버 배포까지 직접 구축 예정

      - layout: top-left
        title: 부동산 실거래 조회 서비스
        sub_title: 개인 프로젝트
        caption: Spring Boot · React · Docker · GitHub Actions · Azure · Vercel
        link: realelstate.vercel.app
        link_text: 부동산 실거래 조회 서비스 방문
        quote: >
          공공데이터 기반 아파트 실거래 정보를 시각화하는 웹 서비스
        description: |
          - 공공데이터 API를 활용한 지역별 아파트 실거래 데이터 수집 및 제공
          - 거래 지표 및 거래 금액 차트 시각화
          - 네이버 지도 API를 활용한 매물 위치 표시
          - Azure 서버(1 CPU, 1GB RAM) 배포 환경에서 서버 사양 한계를
            경험하고, 프론트엔드를 Vercel로 분리하여 안정성 확보
          - Docker 컨테이너화 및 GitHub Actions를 통한 CI/CD 자동화 구축
      
      - layout: top-left
        title: Beanst
        sub_title: 호텔 예약 시스템 (팀 프로젝트 · 5인 · 2주)
        caption: DynamicWeb · JSP · jQuery
        quote: >
          웹 서비스의 기본 동작 원리를 직접 구현하며 익힌 호텔 예약 플랫폼
        description: |
          - DB 설계 전반 담당 및 테이블 간 외래키 관계 정의
          - 회원가입 / 로그인 기능 구현 (세션 기반 인증)
          - 객실 예약 프로세스 설계 및 개발
          - 관리자 페이지 회원 관리 기능 개발
          - 프로젝트를 통해 HTTP 요청/응답 흐름, DB 연동 등
            웹 서비스의 기본 동작 원리를 깊이 이해

