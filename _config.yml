about_content: |
  새로운 기술을 접할 때마다 '이걸 어떻게 써볼 수 있을까'를 먼저 생각하는 개발자입니다.
  배움이 빠른 편이고, 기능을 익히면 더 나은 방법이 없을지 스스로 찾아보는 습관이 있습니다.

  에러를 만나는 것을 좋아합니다. 원인을 추적하고 해결했을 때 '내가 한 가지 더 알았다'는 감각이
  개발을 계속하게 만드는 원동력입니다. 성장하고 있다는 느낌이 좋아서, 어제보다 조금 더
  잘 만드는 것을 목표로 합니다.

  Java/Spring 백엔드를 중심으로 인증·보안 영역에 깊이 있는 경험을 쌓았으며,
  실제 서비스 수준의 프로젝트를 통해 설계부터 배포까지의 전체 흐름을 익혔습니다.

